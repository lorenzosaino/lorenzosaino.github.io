name: HTML check
on:
  push:
  pull_request:
  schedule:
  - cron: 0 3 * * 6  # Every Saturday at 3:00 AM
permissions:
  contents: read
jobs:
  htmlcheck:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    - name: Install Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: "3.4"
        bundler-cache: true
    # Google Scholar returns 403, ignore response
    # LinkedIn returns 999 status, ignore response
    # Only fail for 4xx because UCL website checks fail because of a certificate issue
    - name: Run HTML proofer
      run: bundle exec htmlproofer index.html --check-html --http-status-ignore 403,999 --url-ignore "#" --only-4xx --check-opengraph --check-img-http --check-sri --log-level debug
